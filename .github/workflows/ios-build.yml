name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-simulator:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project WorkoutApp.xcodeproj \
            -scheme WorkoutApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path '*Build/Products/Debug-iphonesimulator/WorkoutApp.app' -print -quit)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" WorkoutApp-simulator.zip

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkoutApp-simulator
          path: WorkoutApp-simulator.zip
