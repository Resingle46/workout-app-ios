name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-simulator:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show project schemes
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -project WorkoutApp.xcodeproj

      - name: Build for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project WorkoutApp.xcodeproj \
            -scheme WorkoutApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Package simulator app
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path '*Build/Products/Debug-iphonesimulator/WorkoutApp.app' -print -quit)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" WorkoutApp-simulator.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: warn

      - name: Upload simulator app artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: WorkoutApp-simulator
          path: WorkoutApp-simulator.zip

  build-device-unsigned-ipa:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned iPhone app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project WorkoutApp.xcodeproj \
            -scheme WorkoutApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee xcodebuild-device.log

      - name: Package unsigned IPA
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path '*Build/Products/Release-iphoneos/WorkoutApp.app' -print -quit)"
          test -n "$app_path"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$app_path" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload WorkoutApp-unsigned.ipa

      - name: Upload device build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-device-log
          path: xcodebuild-device.log
          if-no-files-found: warn

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: WorkoutApp-unsigned-ipa
          path: WorkoutApp-unsigned.ipa
